# ============================================================================
# cc (OpenClaw + Claude Code) — tmux config
#
# This file is loaded by the `cc` wrapper on a DEDICATED tmux socket
# (`tmux -L cc -f <this file>`), so it doesn't touch your personal tmux
# config or collide with any other tmux sessions you have running.
#
# Optimized for Mosh: big scrollback, working mouse wheel, no ESC lag.
# ============================================================================

# ---- Scrollback & Mosh essentials --------------------------------------------

# Mosh has no scrollback of its own — tmux IS the scrollback.
# 100k lines is generous without being memory-stupid.
set -g history-limit 100000

# Mouse on: wheel scrolls, click selects panes, drag selects text.
set -g mouse on

# Zero ESC lag — Mosh makes any escape-time delay feel awful in vim/Claude Code.
set -s escape-time 0

# True-color terminal (Claude Code's TUI looks much better with this).
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm*:Tc,alacritty*:Tc,wezterm*:Tc"

# Let panes report focus events to programs inside (nicer for TUIs).
set -g focus-events on

# Renumber windows when one closes — keeps indices tidy.
set -g renumber-windows on

# Start counting from 1 — the 0 key is too far from 1 on most keyboards.
set -g base-index 1
setw -g pane-base-index 1

# ---- Mouse wheel scrolling (smooth, auto-enter copy mode) --------------------

# When you scroll up outside copy mode, tmux auto-enters copy mode and scrolls.
# The `-e` flag on copy-mode means "exit at bottom", so you never get stuck
# in copy mode after scrolling back down.
bind-key -T root WheelUpPane \
    if-shell -F -t = "#{?pane_in_mode,1,#{alternate_on}}" \
        "send-keys -M" \
        "copy-mode -e; send-keys -M"

bind-key -T root WheelDownPane \
    if-shell -F -t = "#{?pane_in_mode,1,#{alternate_on}}" \
        "send-keys -M" \
        "send-keys -M"

# Copy-mode keybinds: vi-style (hjkl, v to select, y to yank).
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# Shift+PageUp/Down for fast keyboard scrollback (works even inside Claude Code).
bind -n S-PageUp copy-mode -u
bind -n S-PageDown send-keys PageDown

# ---- Pane navigation ---------------------------------------------------------

# Alt+Arrow: jump between panes without the prefix.
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Prefix + hjkl: vi-style pane nav (for muscle memory).
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Prefix + | and -: split in the direction of the symbol.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Prefix + B / H / T: re-flow layout.
#   B = "bars" (horizontal strips stacked top-to-bottom)
#   H = "horizontal" (vertical columns side-by-side)
#   T = "tiled"
bind B select-layout even-vertical
bind H select-layout even-horizontal
bind T select-layout tiled

# Prefix + r: reload config.
bind r source-file ~/.openclaw/bridge/tmux.conf \; display "cc tmux config reloaded"

# ---- Appearance — cockpit ----------------------------------------------------

set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#0e1116,fg=#7d8590"

# Left: [cc] session-name
set -g status-left "#[bg=#2a7ba0,fg=#ffffff,bold] cc #[bg=#0e1116,fg=#2a7ba0] #S #[fg=#3d4450]│ "
set -g status-left-length 40

# Right: clock + hostname
set -g status-right "#[fg=#3d4450]│ #[fg=#7d8590]%H:%M #[fg=#3d4450]│ #[fg=#2a7ba0]#(hostname -s) "
set -g status-right-length 60

# Windows list
set -g window-status-format "#[fg=#606770] #I #W "
set -g window-status-current-format "#[bg=#1c2128,fg=#2a7ba0,bold] #I #W "
set -g window-status-separator ""

# Pane borders: thin grey, bright blue on active
set -g pane-border-style "fg=#1c2128"
set -g pane-active-border-style "fg=#2a7ba0"

# Per-pane title bar on top of each pane — shows pane index + title
set -g pane-border-status top
set -g pane-border-format " #[fg=#7d8590]#{pane_index} #[fg=#2a7ba0,bold]#{pane_title} #[fg=#7d8590]#{?pane_active,● active,}"

# Message line
set -g message-style "bg=#2a7ba0,fg=#ffffff,bold"
set -g message-command-style "bg=#2a7ba0,fg=#ffffff"

# ---- Misc UX -----------------------------------------------------------------

# Don't wait for repeated commands (the default is 500ms).
set -g repeat-time 300

# Notify when something happens in a background window.
setw -g monitor-activity on
set -g visual-activity off
